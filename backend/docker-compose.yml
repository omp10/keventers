services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keventers-api
    restart: unless-stopped
    ports:
      - '${PORT:-4000}:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: keventers
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - keventers-net

  mongo:
    image: mongo:7
    container_name: keventers-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keventers-net

  redis:
    image: redis:7-alpine
    container_name: keventers-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keventers-net

volumes:
  mongo-data:
  redis-data:

networks:
  keventers-net:
    driver: bridge
