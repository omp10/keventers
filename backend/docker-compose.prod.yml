services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "src/server.js"]
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - edge
      - internal

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "src/worker.js"]
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./ops/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edge
      - internal

volumes:
  redis-data:

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
