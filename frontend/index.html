<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/keventers/logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/brand/keventers/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5" />
    <meta name="theme-color" content="#0B0B0F" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Keventers" />
    <meta name="description" content="Keventers — scan, discover, and order in seconds." />
    <title>Keventers</title>
    <!--
      Anti-FOUC: resolve the persisted theme (light | dark | system) BEFORE first
      paint so the correct color scheme is applied with no flash. Mirrors the
      ThemeProvider's storage key.
    -->
    <script>
      (function () {
        try {
          var KEY = 'kv-theme';
          var stored = localStorage.getItem(KEY);
          // First visit defaults to LIGHT — the brand's warm cream canvas is the
          // intended first impression. Only follow the OS once the user has
          // explicitly chosen 'system'. Must match the ThemeProvider default.
          var mode = stored || 'light';
          var dark =
            mode === 'dark' ||
            (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var root = document.documentElement;
          root.classList.toggle('dark', dark);
          root.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
